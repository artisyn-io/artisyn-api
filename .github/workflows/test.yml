name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artisyn
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d artisyn"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/artisyn?schema=artisyn_api
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: artisyn
      JWT_SECRET: your-jwt-secret-key
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      GOOGLE_CALLBACK: http://localhost:3000/api/auth/google/callback
      GOOGLE_CLIENT_ID: xxxxxxx
      GOOGLE_CLIENT_SECRET: xxxxxxx
      FACEBOOK_CALLBACK: http://localhost:3000/api/auth/facebook/callback
      FACEBOOK_CLIENT_ID: xxxxxxx
      FACEBOOK_CLIENT_SECRET: xxxxxxx

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/artisyn?schema=artisyn_api
          JWT_SECRET=your-jwt-secret-key
          JWT_EXPIRES_IN=7d
          NODE_ENV=test
          GOOGLE_CALLBACK=http://localhost:3000/api/auth/google/callback
          GOOGLE_CLIENT_ID=xxxxxxx
          GOOGLE_CLIENT_SECRET=xxxxxxx
          FACEBOOK_CALLBACK=http://localhost:3000/api/auth/facebook/callback
          FACEBOOK_CLIENT_ID=xxxxxxx
          FACEBOOK_CLIENT_SECRET=xxxxxxx
          EOF

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres -d artisyn; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      # Database setup for CI tests
      # Generate Prisma Client from schema
      - name: Generate Prisma Client
        run: pnpm prisma generate

      # Reset and migrate to guarantee a clean schema for every run.
      - name: Reset Database Schema
        run: pnpm prisma migrate reset --force --skip-seed

      - name: Verify Prisma migration status
        run: pnpm prisma migrate status

      - name: Verify required tables exist
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/artisyn?schema=artisyn_api" -c "\dt artisyn_api.*"

      # Seed the database with test data
      - name: Seed Database
        run: pnpm prisma db seed

      - name: Run Tests
        run: pnpm vitest --run --maxWorkers=1
